<div class="min-h-screen bg-background p-6 md:p-8">
  <!-- Header -->
  <div class="mb-8">
    <h1 class="text-3xl font-bold text-foreground">Users Management</h1>
    <p class="text-muted-foreground mt-2">Search and manage platform users</p>
  </div>

  <!-- Filter Bar -->
  <app-users-filter-bar (filterSubmitted)="onFilterSubmitted($event)" />

  <!-- Users List -->
  <app-users-list
    [paginatedData]="paginatedData()"
    [isLoading]="isLoading()"
    (userSelected)="onUserSelected($event)"
  />
</div>
