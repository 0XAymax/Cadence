<div class="bg-card border border-border rounded-lg p-6 mb-8">
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-6">
    <!-- First Name -->
    <div class="flex flex-col gap-2">
      <label hlmLabel for="firstName" class="text-sm font-medium">First Name</label>
      <input
        hlmInput
        id="firstName"
        type="text"
        placeholder="Search by first name..."
        [formControl]="firstNameCtrl"
      />
    </div>

    <!-- Last Name -->
    <div class="flex flex-col gap-2">
      <label hlmLabel for="lastName" class="text-sm font-medium">Last Name</label>
      <input
        hlmInput
        id="lastName"
        type="text"
        placeholder="Search by last name..."
        [formControl]="lastNameCtrl"
      />
    </div>

    <!-- Gender -->
    <div class="flex flex-col gap-2">
      <label hlmLabel for="gender" class="text-sm font-medium">Gender</label>
      <select hlmSelect id="gender" [formControl]="genderCtrl">
        @for (option of genderOptions; track option.value) {
          <option [value]="option.value">{{ option.label }}</option>
        }
      </select>
    </div>

    <!-- Email -->
    <div class="flex flex-col gap-2">
      <label hlmLabel for="email" class="text-sm font-medium">Email</label>
      <input
        hlmInput
        id="email"
        type="email"
        placeholder="Search by email..."
        [formControl]="emailCtrl"
      />
    </div>

    <!-- Phone -->
    <div class="flex flex-col gap-2">
      <label hlmLabel for="phone" class="text-sm font-medium">Phone</label>
      <input
        hlmInput
        id="phone"
        type="tel"
        placeholder="Search by phone..."
        [formControl]="phoneCtrl"
      />
    </div>

    <!-- Status -->
    <div class="flex flex-col gap-2">
      <label hlmLabel for="status" class="text-sm font-medium">Status</label>
      <select hlmSelect id="status" [formControl]="statusCtrl">
        @for (option of statusOptions; track option.value) {
          <option [value]="option.value">{{ option.label }}</option>
        }
      </select>
    </div>
  </div>

  <!-- Action Buttons -->
  <div class="flex gap-3 justify-end">
    <button hlmBtn variant="outline" (click)="onReset()">Reset</button>
    <button hlmBtn (click)="onFilter()">Search</button>
  </div>
</div>
