<div hlmCard class="mb-4">
  <div hlmCardHeader class="pb-2">
    <div class="flex items-center gap-3">
      <div
        class="bg-muted flex items-center justify-center rounded-full h-10 w-10 text-sm font-medium"
      >
        {{ session().sharedByUsername.charAt(0).toUpperCase() }}
      </div>
      <div>
        <p class="text-sm font-medium">
          {{ session().sharedByUsername }}
          <span class="text-muted-foreground font-normal">shared a session</span>
        </p>
        <p class="text-xs text-muted-foreground">
          {{ session().sharedAt | date: 'mediumDate' }}
        </p>
      </div>
    </div>
  </div>

  <div hlmCardContent class="pb-3">
    <div class="bg-muted/50 rounded-lg p-4 border border-border">
      <div class="flex justify-between items-start mb-2">
        <div>
          <h4 class="font-semibold">{{ session().sessionTitle }}</h4>
          <p class="text-sm text-muted-foreground">
            Permission: {{ session().permission === 'EDIT' ? 'Can Edit' : 'View Only' }}
          </p>
        </div>
        <span hlmBadge variant="secondary">{{ session().permission }}</span>
      </div>
    </div>
  </div>
</div>
