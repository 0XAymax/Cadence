<hlm-card class="bg-card shadow-sm border border-border" [ngClass]="getBorderColor()">
  <div
    class="p-4 sm:p-5 flex flex-col sm:flex-row sm:items-start justify-between gap-4 cursor-pointer"
    (click)="toggleExpand.emit()"
  >
    <div class="flex-1">
      <div class="flex flex-wrap items-center gap-2 mb-1">
        <h3 class="font-semibold text-foreground text-lg">{{ subject().name }}</h3>
        <hlm-badge [variant]="getBadgeVariant()" class="text-[10px] h-5 px-2">{{
          subject().priority
        }}</hlm-badge>
      </div>
      <p class="text-sm text-muted-foreground">{{ subject().description }}</p>
    </div>

    <div class="flex items-center gap-2" (click)="$event.stopPropagation()">
      <button
        [hlmDropdownMenuTrigger]="subjectMenu"
        hlmBtn
        variant="ghost"
        size="icon"
        class="h-8 w-8 text-muted-foreground"
      >
        <lucide-angular [img]="MoreVertical" class="h-4 w-4" />
      </button>
      <button
        hlmBtn
        variant="ghost"
        size="icon"
        class="h-8 w-8 text-muted-foreground"
        (click)="toggleExpand.emit()"
      >
        <lucide-angular [img]="isExpanded() ? ChevronDown : ChevronRight" class="h-5 w-5" />
      </button>
    </div>
  </div>

  <!-- Expanded Content (Goals) -->
  @if (isExpanded()) {
    <div class="px-4 pb-5 sm:px-5 sm:pb-5 pt-0 border-t border-border/50 bg-muted/20">
      <div class="flex items-center justify-between mb-4 mt-4">
        <h4 class="text-sm font-medium text-foreground">Goals</h4>
        <!-- Add Goal Sheet -->
        <app-goal-form [SubjectName]="subject().name" [subjectId]="subject().id" />
      </div>

      <!-- Goals List -->
      @if (subject().goals.length > 0) {
        <div class="flex flex-col gap-3">
          @for (goal of subject().goals; track goal.id) {
            <app-goal-item
              [goal]="goal"
              [isExpanded]="expandedGoalId === goal.id"
              (toggleExpand)="toggleGoal(goal.id)"
            />
          }
        </div>
      } @else {
        <!-- Empty Goals State -->
        <div
          class="flex flex-col items-center justify-center p-6 border border-dashed border-border rounded-lg bg-card text-center"
        >
          <p class="text-sm text-muted-foreground mb-3">No goals yet for this subject.</p>
        </div>
      }
    </div>
  }
</hlm-card>

<ng-template #subjectMenu>
  <hlm-dropdown-menu>
    <button hlmMenuItem>Edit subject</button>
    <button hlmMenuItem class="text-destructive">Delete subject</button>
  </hlm-dropdown-menu>
</ng-template>
