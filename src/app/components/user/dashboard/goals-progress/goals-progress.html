<div hlmCard class="border border-border rounded-xl shadow-none h-full">
  <div hlmCardContent class="p-4">
    <div class="flex items-center justify-between mb-4">
      <h3 class="text-sm font-semibold text-foreground">Goals Progress</h3>
      <a href="#" class="text-xs text-muted-foreground hover:text-foreground transition-colors"
        >View all</a
      >
    </div>

    <div class="flex flex-col gap-4">
      @for (goal of goals; track goal.title) {
        <div class="flex flex-col gap-1.5">
          <div class="flex items-center justify-between">
            <p class="text-sm font-medium text-foreground">{{ goal.title }}</p>
            <span class="text-xs text-muted-foreground">{{ goal.progress }}%</span>
          </div>
          <div class="h-1.5 w-full rounded-full bg-muted overflow-hidden">
            <div
              class="h-full rounded-full bg-primary transition-all"
              [style.width.%]="goal.progress"
            ></div>
          </div>
          <p class="text-xs text-muted-foreground">{{ goal.tasks }}</p>
        </div>
      }
    </div>
  </div>
</div>
