<div hlmCard class="border border-border rounded-xl shadow-none h-full">
  <div hlmCardContent class="p-4">
    <div class="flex items-center justify-between mb-4">
      <h3 class="text-sm font-semibold text-foreground">Today's Schedule</h3>
      <a href="#" class="text-xs text-muted-foreground hover:text-foreground transition-colors"
        >View all</a
      >
    </div>

    <div class="flex flex-col gap-2">
      @for (session of sessions; track session.time) {
        <div class="flex items-center gap-3 rounded-lg border border-border p-3">
          <div class="w-1 self-stretch rounded-full {{ session.color }}"></div>
          <div class="flex-1 min-w-0">
            <p class="text-sm font-medium text-foreground truncate">{{ session.subject }}</p>
            <p class="text-xs text-muted-foreground truncate">{{ session.topic }}</p>
          </div>
          <div class="text-right shrink-0">
            <p class="text-sm font-medium text-foreground">{{ session.time }}</p>
            <p class="text-xs text-muted-foreground">{{ session.duration }}</p>
          </div>
        </div>
      }
    </div>
  </div>
</div>
