<div class="flex flex-col gap-4 p-4 sm:flex-row sm:items-start sm:gap-6">
  <div class="flex min-w-36 items-center gap-3 pt-2">
    <hlm-switch [(ngModel)]="daySchedule.enabled" aria-label="Toggle day availability" />
    <span class="font-medium text-sm">{{ daySchedule.day }}</span>
  </div>

  <div class="flex flex-1 flex-col gap-4">
    @if (!daySchedule.enabled) {
      <p class="text-sm text-muted-foreground pt-1.5 pl-1">Unavailable</p>
    } @else {
      @for (slot of daySchedule.slots; track $index) {
        <div class="flex items-center gap-2 flex-wrap sm:flex-nowrap">
          <div class="flex items-center gap-3">
            <input
              hlmInput
              type="time"
              [(ngModel)]="slot.start"
              class="w-32"
              aria-label="Start time"
            />
            <span class="text-muted-foreground text-sm">to</span>
            <input hlmInput type="time" [(ngModel)]="slot.end" class="w-32" aria-label="End time" />
          </div>
          <button
            hlmBtn
            variant="ghost"
            size="icon"
            class="h-9 w-9 text-muted-foreground hover:text-destructive shrink-0"
            (click)="removeSlot($index)"
            title="Remove slot"
          >
            <lucide-angular [img]="Trash2" class="h-4 w-4" />
          </button>
        </div>
      }
      <button
        hlmBtn
        variant="ghost"
        size="sm"
        class="w-fit gap-2 mt-0 text-muted-foreground hover:text-primary pl-1"
        (click)="addSlot()"
      >
        <lucide-angular [img]="Plus" class="h-4 w-4" />
        Add hours
      </button>
    }
  </div>
</div>
