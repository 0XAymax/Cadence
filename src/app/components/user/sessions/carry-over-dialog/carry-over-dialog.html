<hlm-dialog [state]="state()" (stateChanged)="onStateChange($event)">
  <hlm-dialog-content *hlmDialogPortal="let ctx" style="width: 500px; max-width: 500px">
    <hlm-dialog-header>
      <h2 hlmSheetTitle class="text-lg">You missed some sessions last week</h2>
      <p hlmSheetDescription class="text-sm">
        Select which sessions you'd like to carry over to this week.
      </p>
    </hlm-dialog-header>

    <div class="py-4 space-y-3">
      @for (item of items(); track item.id) {
        <div
          class="flex items-start gap-3 p-3 rounded-md border border-border bg-muted/20"
        >
          <hlm-checkbox
            [checked]="item.selected"
            (changed)="toggleItem($index)"
            class="mt-0.5"
          />
          <div class="flex-1 cursor-pointer" (click)="toggleItem($index)">
            <div class="text-sm font-medium">{{ item.subjectName }}</div>
            <div class="text-xs text-muted-foreground">
              {{ item.dayOfWeek | titlecase }} • {{ item.startTime }} - {{ item.endTime }}
            </div>
          </div>
        </div>
      }
    </div>

    <hlm-dialog-footer>
      <button hlmBtn variant="outline" (click)="handleSkip(ctx)">Skip</button>
      <button hlmBtn (click)="handleAddToWeek(ctx)">Add to this week</button>
    </hlm-dialog-footer>
  </hlm-dialog-content>
</hlm-dialog>
