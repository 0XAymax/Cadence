<hlm-sheet>
  <div class="flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between">
    <div>
      <h1 class="text-xl font-semibold tracking-tight text-foreground">Subjects</h1>
      <p class="text-sm text-muted-foreground mt-0.5">Organize your learning by topic.</p>
    </div>
    <button hlmBtn size="sm" class="gap-2" hlmSheetTrigger side="right">
      <lucide-angular [img]="Plus" class="h-4 w-4" />
      New subject
    </button>
  </div>

  <hlm-sheet-content *hlmSheetPortal="let ctx" class="flex flex-col gap-4">
    <div hlmSheetHeader side="right">
      <h2 hlmSheetTitle class="text-lg">Create subject</h2>
      <p hlmSheetDescription class="text-sm">
        Add a new subject to organize your sessions and goals.
      </p>
    </div>

    <div class="grid gap-6 p-6">
      <div class="grid gap-2.5">
        <label hlmLabel for="subject-name">Subject name</label>
        <input hlmInput id="subject-name" placeholder="e.g. Mathematics" />
      </div>

      <div class="grid gap-2.5">
        <label hlmLabel for="subject-description">Description</label>
        <input hlmInput id="subject-description" placeholder="Optional short note" />
      </div>

      <div class="grid gap-2.5">
        <label hlmLabel for="subject-priority">Priority</label>
        <select
          id="subject-priority"
          class="h-9 w-full rounded-md border border-input bg-transparent px-3 text-sm text-foreground"
        >
          <option>High</option>
          <option>Medium</option>
          <option>Low</option>
        </select>
      </div>
    </div>

    <div hlmSheetFooter class="mt-2 flex flex-row items-center justify-end gap-3">
      <button hlmBtn variant="outline" size="sm" hlmSheetClose>Cancel</button>
      <button hlmBtn size="sm">Create subject</button>
    </div>
  </hlm-sheet-content>
</hlm-sheet>
